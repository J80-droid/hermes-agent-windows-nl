# Canonieke toolset-policy per Hermes-profiel (Windows NL fork).
# Sync: windows/scripts/sync_profile_toolsets_from_manifest.ps1
# Audit: docs/DOMAIN_TOOLSET_AUDIT.md
version: '1.0'

# Overal uitgesloten van platform_toolsets.cli (gebruik nooit hermes-cli preset hier).
never_default_global:
  - hermes-cli
  - moa
  - tts
  - image_gen
  - video_gen
  - cronjob
  - messaging
  - computer_use
  - homeassistant
  - skills_hub

root:
  platform_toolsets:
    cli: []
  toolsets: []
  note: "Profiel bepaalt tools. Expliciet cli: [] voorkomt hermes-cli fallback (zie tools_config patch)."

# Optioneel: verkleint skills-index (prefix-match op skill-mapnaam).
skills_disabled_suggestions:
  - spotify
  - comfyui
  - touchdesigner
  - blogwatcher

profiles:
  core:
    platform_toolsets:
      cli:
        - mcp
        - file
        - memory
        - skills
        - clarify
        - web
        - terminal
        - browser
        - kanban
        - todo
    optional_toolsets:
      - delegation
      - session_search
    never_default:
      - hermes-cli
    max_tools: 24
    ask_triggers:
      delegation: "Multi-step subtaak die een geïsoleerde subagent vereist."
      session_search: "Terugzoeken in eerdere core-sessies zonder RAG."

  legal:
