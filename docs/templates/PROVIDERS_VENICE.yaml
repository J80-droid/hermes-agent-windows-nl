# Reference fragment — Venice custom provider (OpenAI-compatible API).
# Restore via windows/scripts/merge_legacy_providers_config.py or manually in root config.

providers:
  venice:
    base_url: https://api.venice.ai/api/v1
    provider: custom
    api_key_env: VENICE_API_KEY
    # Optional Venice chat features (merged into chat/completions body):
    # extra_body:
    #   venice_parameters:
    #     enable_web_search: auto
    #     character_slug: my-character
    # Model suffixes also work: e.g. zai-org-glm-5-1:web

# Requires VENICE_API_KEY in runtime .env (sync: windows/SYNC_HERMES_API_ENV.bat)
# Quota UX (agent/venice_usage.py):
#   Status bar VN … — billing/balance + api_keys/rate_limits only (fast, 90s cache)
#   /vquota (full extended) · /usage (account: usage + usage-analytics)
# Model pickers (hermes_cli/venice_model_picker.py):
#   hermes model / setup — trait filter + OpenAI mapping; optional venice_parameters prompt
#   Telegram /model — vf:* helper keyboard before model list (traits + compatibility_mapping)
#   Typed /model gpt-4o --provider venice — OpenAI name resolved via compatibility_mapping
