# Fork-only: institutional repo-hygiene + legal skills E2E (PowerShell, geen live HTTP).
name: Fork Windows Institutional

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: fork-windows-institutional-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  hardening:
    if: github.repository == 'J80-droid/hermes-agent-windows-nl'
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      # Lokaal: conda `hermes-env` (zie windows/HermesPythonPolicy.ps1). CI gebruikt pip 3.11 — volledige `RUN_AUDITS -IncludeAllE2E` blijft lokale poort (~20 min).
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install package (dev + RAG for platform gate)
        run: python -m pip install --upgrade pip && pip install -e ".[dev]" && pip install pyarrow lancedb

      - name: Seed minimal HERMES_HOME for overlay E2E
        shell: pwsh
        run: |
          $home = Join-Path $env:LOCALAPPDATA 'hermes'
          New-Item -ItemType Directory -Force -Path $home | Out-Null
          if (-not (Test-Path (Join-Path $home 'config.yaml'))) {
            @'
          display:
            show_cost: true
            show_status_bar_tps: true
          '@ | Set-Content -Encoding UTF8 (Join-Path $home 'config.yaml')
          }
          echo "HERMES_HOME=$home" >> $env:GITHUB_ENV

      - name: Configure upstream remote
        run: |
          git remote add upstream https://github.com/NousResearch/hermes-agent.git
          git fetch upstream main --depth=1

      # Volledige RUN_LEGAL_DOMAIN_E2E vereist %LOCALAPPDATA%\hermes runtime — lokaal vóór release (zie docs/LEGAL_PRODUCTION_GATE.md).
      - name: Nous Tier A drift gate (strict)
        run: powershell -NoProfile -File windows/scripts/Test-NousTreeIdentical.ps1

      - name: RUN_AUDITS 14-fixes E2E
        run: audits\RUN_RUN_AUDITS_14_FIXES_E2E.bat

      - name: Pytest audit-env E2E
        run: audits\RUN_PYTEST_AUDIT_ENV_E2E.bat

      - name: Institutional guard tier-a-cli
        run: python scripts/verify_institutional_guard.py --check-tier-a-cli

      - name: Overlay unit tests
        run: python -m pytest tests/overlay/ -q -o addopts=

      - name: SYNC_NOUS overlay E2E
        run: windows\audits\RUN_SYNC_NOUS_E2E.bat

      - name: Nous overlay institutional E2E
        run: audits\RUN_NOUS_OVERLAY_INSTITUTIONAL_E2E.bat

      - name: Build fork TUI assets (SkipWeb) + drift gate
        run: |
          powershell -NoProfile -File windows/scripts/build_fork_ui_assets.ps1 -SkipWeb
          powershell -NoProfile -File windows/scripts/Test-NousTreeIdentical.ps1

      - name: Institutional hardening E2E (H1–H14, incl. legal pytest)
        env:
          HERMES_SKIP_PAUSE_AFTER_UPDATE: '1'
          OPENROUTER_API_KEY: ''
          OPENAI_API_KEY: ''
          NOUS_API_KEY: ''
        run: audits\RUN_INSTITUTIONAL_HARDENING_E2E.bat

      - name: Platform hardening production gate
        env:
          PYTEST_ADDOPTS: ''
        run: windows\audits\RUN_PLATFORM_HARDENING_PRODUCTION_GATE.bat
