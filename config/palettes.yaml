# Hermes institutional colour palettes — user-editable, hot-reload friendly.
# Place this file in the repo root or under config/palettes.yaml.
# The renderer loads it at runtime; missing keys fall back to the built-in demo palette.

# Each palette MUST define at least: h1, h2, h3, h4, strong, label, text, table_header, code, link.
# Values are Rich style strings (hex colours or Rich colour names).

demo:
  h1: "bold #66d9ef underline"
  h2: "bold #a6e22e"
  h3: "bold #e6db74"
  h4: "bold #ae81ff italic"
  h5: "italic #cbd5e1"
  h6: "dim"
  strong: "bold #ff9e64"
  code: "#66d9ef"
  link: "underline #66d9ef"
  table_header: "bold #66d9ef"
  label: "bold #f92672"
  text: "#cbd5e1"

